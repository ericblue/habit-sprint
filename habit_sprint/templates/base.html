<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Habit Sprint{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="stylesheet" href="/static/style.css">
  {% block head %}{% endblock %}
</head>
<body>
  <nav>
    <span class="nav-brand">Habit Sprint</span>
    <button class="nav-toggle" onclick="this.nextElementSibling.classList.toggle('open')" aria-label="Toggle navigation">&#9776;</button>
    <div class="nav-links">
      <a href="/" class="{% if active_nav == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/habits" class="{% if active_nav == 'habits' %}active{% endif %}">Habits</a>
      <a href="/sprints" class="{% if active_nav == 'sprints' %}active{% endif %}">Sprints</a>
    </div>
  </nav>
  <main>
    {% if success_message %}
    <div class="alert alert-success">{{ success_message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
